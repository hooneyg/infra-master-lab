# ╔══════════════════════════════════════════════════════════════════╗
# ║         ⚙️ application.yml (Business Service Config)            ║
# ║                                                                  ║
# ║  [주요 설정]                                                     ║
# ║  1. 포트: 8081                                                   ║
# ║  2. DB: H2 In-memory (테스트용)                                  ║
# ║  3. JPA: Hibernate SQL 로깅 활성화                               ║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8081

spring:
  application:
    name: business-service

  datasource:
    url: jdbc:h2:mem:businessdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.hooney.lab: debug
