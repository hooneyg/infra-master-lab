# ╔══════════════════════════════════════════════════════════════════╗
# ║         ⚙️ application.yml (Gateway Service Config)             ║
# ║                                                                  ║
# ║  [주요 설정]                                                     ║
# ║  1. 포트: 8080                                                   ║
# ║  2. 라우팅: /api/** -> business-service (8081)                    ║
# ║  3. Spring Boot 4.0.x 마이그레이션 완료                           ║
# ╚══════════════════════════════════════════════════════════════════╝

server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: business-service
              uri: ${BUSINESS_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: debug
