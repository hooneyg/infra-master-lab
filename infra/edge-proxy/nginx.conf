# ╔══════════════════════════════════════════════════════════════════╗
# ║        🛡️ Nginx Reverse Proxy 설정 (Zero Trust)                  ║
# ║  Cloudflare Tunnel로부터 안전하게 인그레스된 트래픽을 필터링하고 ║
# ║  내부 API Gateway 및 마이크로서비스로 라우팅하는 역할입니다.       ║
# ╚══════════════════════════════════════════════════════════════════╝

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. 보안 헤더 강제 주입 (Clickjacking, XSS 방어)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 2. 클라이언트의 실제 IP 복원 규칙 (Cloudflare 대역 명시)
    # Cloudflare를 거쳐 오기 때문에 Nginx에는 Cloudflare 엣지 서버의 IP가 찍히는 것을 방지합니다.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    server {
        listen 80;
        server_name _; # 모든 호스트 요청 허용 (오직 터널을 통과한 트래픽만 이곳에 도달함)

        # 상태 점검 엔드포인트
        location /health {
            access_log off;
            return 200 '{"status": "Edge Proxy is Healthy (Zero Trust Protected)"}';
            add_header Content-Type application/json;
        }

        # 마이크로서비스 (API Gateway) 라우팅
        location /api/ {
            # 실제 운영 환경에서는 MSA의 Gateway 서비스 컨테이너명(api-gateway)으로 라우팅합니다.
            # proxy_pass http://api-gateway:8080;
            
            # 테스트 및 데모를 위해 200 OK 응답 모의 (Mock)
            return 200 '{"message": "Gateway Routing Simulated via Nginx Reverse Proxy"}';
            add_header Content-Type application/json;
        }
    }
}
