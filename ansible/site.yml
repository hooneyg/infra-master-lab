# ╔══════════════════════════════════════════════════════════════════╗
# ║         🐍 site.yml (Main Ansible Playbook)                     ║
# ║                                                                  ║
# ║  [이 플레이북의 전략]                                             ║
# ║  전체 서버의 보안 강화부터 런타임 설치까지 일관된 상태를 정의함       ║
# ║  멱등성(Idempotency)을 보장하여 반복 실행에도 안전한 구조 설계       ║
# ╚══════════════════════════════════════════════════════════════════╝

- name: Infrastructure Hardening and Runtime Setup
  # 전체 플레이북의 실행 목적 정의
  
  hosts: all
  # 인벤토리에 정의된 모든 호스트를 대상으로 실행
  
  become: true
  # sudo 권한을 획득하여 시스템 설정 수행
  
  roles:
    # 1순위: OS 보안 강화 및 필수 도구 설치 (가장 기본)
    - common
    
    # 2순위: 컨테이너 기반 런타임 환경 조성
    - docker
    
    # 3순위: 쿠버네티스 노드로 기능하기 위한 구성 수행
    - k8s-node
