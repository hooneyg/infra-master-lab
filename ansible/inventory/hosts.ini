[masters]
k8s-master-01 ansible_host=192.168.1.10

[workers]
k8s-worker-01 ansible_host=192.168.1.20
k8s-worker-02 ansible_host=192.168.1.21

[storage]
db-server-01  ansible_host=192.168.1.30

[all:vars]
ansible_user=hooney
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3 # Python 3 환경 명시
