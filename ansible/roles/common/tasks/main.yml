# ╔══════════════════════════════════════════════════════════════════╗
# ║         🛡️ roles/common/tasks/main.yml (Security Hardening)     ║
# ║                                                                  ║
# ║  [보안 전략]                                                     ║
# ║  최소 권한 원칙과 불필요한 서비스 차단을 통한 공격 표면 축소        ║
# ╚══════════════════════════════════════════════════════════════════╝

- name: Update apt cache and upgrade packages
  # 최신 보안 패치 적용을 위해 패키지 리스트 업데이트 및 업그레이드
  apt:
    update_cache: yes
    # 패키지 인덱스 동기화 수행
    upgrade: dist
    # 의존성을 고려한 전체 시스템 업그레이드 실행

- name: Install essential packages (Python-based tools)
  # 서버 운영 및 Ansible 모듈 구동에 필요한 필수 도구 설치
  apt:
    name:
      - curl
      # 네트워크 요청 테스트 도구
      - vim
      # 텍스트 편집기
      - git
      # 버전 관리 도구
      - ufw
      # 방화벽 관리 도구
      - htop
      # 시스템 모니터링 도구
    state: present
    # 패키지가 설치된 상태임을 보장

- name: Disable Root Login via SSH
  # 보안 취약점 1순위인 루트 직접 접속을 차단하여 무차별 대입 공격 방어
  lineinfile:
    path: /etc/ssh/sshd_config
    # SSH 설정 파일 타겟팅
    regexp: '^PermitRootLogin'
    # 해당 옵션 라인 검색
    line: 'PermitRootLogin no'
    # 루트 로그인 불허용으로 변경
  notify: Restart SSH
  # 변경 시 SSH 서비스 재시작 트리거

- name: Configure UFW (Firewall) - Allow SSH and Web
  # 허용된 포트 외 모든 접근을 차단하기 위한 화이트리스트 정책
  ufw:
    rule: allow
    # 허용 규칙 적용
    port: "{{ item }}"
    # 루프를 통한 포트 번호 대입
    proto: tcp
    # TCP 프로토콜 기반 통신 허용
  loop:
    - 22
    # SSH 관리 포트
    - 80
    # HTTP 웹 포트
    - 443
    # HTTPS 보안 웹 포트

- name: Enable UFW
  # 방화벽을 실제로 활성화하고 기본 정책을 '모두 거부(Deny)'로 설정
  ufw:
    state: enabled
    # 방화벽 활성화 상태 보장
    policy: deny
    # 명시되지 않은 모든 인바운드 트래픽 차단
