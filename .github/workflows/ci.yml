# ╔══════════════════════════════════════════════════════════════════╗
# ║         ⚙️ Infra Master Lab — GitHub Actions CI Pipeline         ║
# ║                                                                  ║
# ║  [이 파이프라인의 역할]                                           ║
# ║  코드가 Push 또는 PR될 때 자동으로 빌드 및 테스트를 실행합니다.    ║
# ║  인프라 매니페스트 및 도커 파일의 유효성을 사전에 검증합니다.       ║
# ║                                                                  ║
# ║  [트리거 조건]                                                    ║
# ║  - main 브랜치에 Push 시                                         ║
# ║  - main 브랜치로의 Pull Request 시                               ║
# ╚══════════════════════════════════════════════════════════════════╝

name: CI - Infrastructure Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: 🔨 Build & Test Verification
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 체크아웃
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      # Step 2: JDK 21 설정
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Gradle 실행 권한 부여
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: 빌드 및 유닛 테스트 실행
      - name: 🧪 Build and Run Tests
        run: ./gradlew build --no-daemon

      # Step 5: Docker 빌드 가능 여부 체크
      # 인프라 마스터 랩이므로 도커 파일의 무결성이 매우 중요합니다.
      - name: 🐳 Docker Build Verification
        run: docker build -t hooney/infra-master-lab:check .

      # Step 6: 테스트 리포트 업로드 (실패 시 원인 파악용)
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            business-service/build/reports/tests/
            gateway-service/build/reports/tests/
            config-service/build/reports/tests/
          retention-days: 7
