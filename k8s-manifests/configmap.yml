# ╔══════════════════════════════════════════════════════════════════╗
# ║         ☸️ configmap.yml (K8S ConfigMap)                         ║
# ║                                                                  ║
# ║  [매니페스트 역할]                                               ║
# ║  1. 애플리케이션의 비환경적인 설정을 분리하여 관리                   ║
# ║  2. 이미지 수정 없이 설정을 변경하여 유연한 운영 환경 구축           ║
# ╚══════════════════════════════════════════════════════════════════╝

apiVersion: v1
# Kubernetes 리소스의 API 그룹 및 버전 정의

kind: ConfigMap
# 설정 데이터를 저장하는 ConfigMap 리소스 타입 명시

metadata:
  name: business-service-config
  # 클러스터 내에서 참조할 ConfigMap의 고유 이름
  labels:
    app: business-service

data:
  # 애플리케이션 기동 시 주입될 환경 설정 데이터
  SPRING_PROFILES_ACTIVE: "prod"
  # 활성화할 스프링 프로파일 지정 (운영 환경)
  
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/infradb"
  # 데이터베이스 연결 주소 (K8S 내부 서비스 이름 사용)
  
  LOGGING_LEVEL_COM_HOONEY: "INFO"
  # 특정 패키지의 로그 레벨 설정
