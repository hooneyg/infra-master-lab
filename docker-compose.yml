# ╔══════════════════════════════════════════════════════════════════╗
# ║         🐳 docker-compose.yml (Local Integration Test)          ║
# ║                                                                  ║
# ║  [이 파일의 목적]                                                ║
# ║  1. 로컬 환경에서 전체 MSA 컴포넌트의 상호작용 검증                ║
# ║  2. K8S 배포 전 서비스 간 네트워크 및 설정 정합성 확인              ║
# ║                                                                  ║
# ║  [기동 순서 보장]                                                 ║
# ║  DB(healthcheck) → Config Service(healthcheck)                    ║
# ║  → Business Service → Gateway Service                            ║
# ╚══════════════════════════════════════════════════════════════════╝

services:
  # 1. Config Service (중앙 집중 설정 서버)
  config-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MODULE_NAME=config-service
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - infra-network

  # 2. Infrastructure DB (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hooney
      POSTGRES_PASSWORD: password
      POSTGRES_DB: infradb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hooney -d infradb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - infra-network

  # 3. Business Service (Hexagonal Core)
  business-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MODULE_NAME=business-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/infradb
      - SPRING_DATASOURCE_USERNAME=hooney
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - infra-network

  # 4. Gateway Service (API Entry Point)
  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - MODULE_NAME=gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-service:8888
      - BUSINESS_SERVICE_URI=http://business-service:8081
    depends_on:
      config-service:
        condition: service_healthy
      business-service:
        condition: service_started
    networks:
      - infra-network

networks:
  infra-network:
    driver: bridge
